name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify CI passed on this commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMIT_SHA=$(git rev-list -1 HEAD~1)
          echo "Checking CI status for commit $COMMIT_SHA"
          for i in 1 2 3 4 5 6; do
            STATUS=$(gh run list --commit "$COMMIT_SHA" --workflow CI --json conclusion -q '.[0].conclusion // empty')
            if [ "$STATUS" = "success" ]; then
              echo "CI passed"
              exit 0
            elif [ "$STATUS" = "failure" ]; then
              echo "CI failed on $COMMIT_SHA — aborting release"
              exit 1
            fi
            echo "CI not finished yet, waiting 30s... (attempt $i/6)"
            sleep 30
          done
          echo "CI did not complete in time — aborting release"
          exit 1

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            NOTES=$(git log --pretty=format:"- %s" HEAD)
          else
            NOTES=$(git log --pretty=format:"- %s" "$PREV_TAG"..HEAD)
          fi
          # Write to file to avoid escaping issues
          echo "$NOTES" > /tmp/release-notes.md
          # Use GH delimiter for multiline output
          {
            echo "body<<RELEASE_EOF"
            cat /tmp/release-notes.md
            echo ""
            echo "RELEASE_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: tauri-build

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: false
          prerelease: false
